      ry: 4;

      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 11px;
      fill: #333;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }

    .node.live { cursor: pointer; }
    .node.live:hover rect { stroke-width: 2.5; }

    .node.coming-soon { opacity: 0.45; }
    .node.coming-soon rect { stroke-dasharray: 4 3; }

    .edge line {
      stroke: #ccc;
      stroke-width: 0.8;
    }

    .arrowhead { fill: #ccc; }

    .node.highlighted rect { stroke-width: 2.5; }
    .node.faded { opacity: 0.12; }
    .edge.faded line { stroke: #eee; }
    .edge.highlighted line { stroke: #999; stroke-width: 1.2; }
    .edge.highlighted .arrowhead { fill: #999; }

    #tooltip {
      display: none;
      position: fixed;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0.5rem 0.7rem;
      font-size: 0.72rem;
      max-width: 260px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      pointer-events: none;
      z-index: 100;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    #tooltip .tt-section { font-size: 0.62rem; color: #888; margin-bottom: 0.2rem; }
    #tooltip .tt-status { font-size: 0.62rem; margin-bottom: 0.15rem; }
    #tooltip .tt-status.live { color: #2a7a2a; }
    #tooltip .tt-status.coming-soon { color: #999; }

      border-top: 1px solid #eee;
      padding-top: 0.2rem;

      font-size: 0.68rem;
      color: #999;
      border-top: 1px solid #eee;
      background: #fff;
    }

    footer a { color: #666; }
  </style>

    { id: 'set-theory-2',         name: 'Set Theory II',        fullName: 'Set Theory II: ZFC Sets, Classes, Rank, Models of ZFC, and Game/Nimber Side Topics', section: 'logic' },

    { id: 'category-theory-2',    name: 'Category Thy. II',     fullName: 'Category Theory II: Limits, Adjunctions, Monads, Monoidal Categories, Abelian Categories, and Localization Technology', section: 'category' },
    { id: 'sheaves-topoi',        name: 'Sheaves & Topoi',      fullName: 'Sheaves, Grothendieck Topologies, Coherent Topologies, Sheafification, and Topoi', section: 'category' },
    { id: 'algebraic-topology',   name: 'Alg. Topology',        fullName: 'Algebraic Topology: Fundamental Groupoids, Singular Homology, Simplicial Sets, Dold–Kan, Model Categories, and Quasicategories', section: 'category' },
    { id: 'algebraic-geometry-1', name: 'Alg. Geometry I',      fullName: 'Algebraic Geometry I: Affine Schemes, Spec, Structure Sheaf, Locally Ringed Spaces, and Schemes', section: 'category' },
    { id: 'algebraic-geometry-2', name: 'Alg. Geometry II',     fullName: 'Algebraic Geometry II: Projective Spectrum, Morphism Properties, Descent, Étale/Smooth/Proper Theory, Sites over Schemes, and Higher Sheaf Technology', section: 'category' },

  const edges = [

    ['algebraic-structures', 'ring-theory'],
    ['algebraic-structures', 'linear-algebra-1'],

    ['linear-algebra-1', 'commutative-algebra-1'],
    ['commutative-algebra-1', 'commutative-algebra-2'],

    ['linear-algebra-1', 'field-galois'],

    ['ring-theory', 'representation-theory'],
    ['linear-algebra-1', 'representation-theory'],
    ['ring-theory', 'lie-algebras'],
    ['linear-algebra-1', 'lie-algebras'],
    ['linear-algebra-2', 'homological-algebra'],
    ['category-theory-2', 'homological-algebra'],
    ['ring-theory', 'algebra-seminar'],
    ['linear-algebra-1', 'algebra-seminar'],

    ['functions-relations', 'general-topology'],
    ['orders-lattices', 'general-topology'],
    ['general-topology', 'metric-spaces'],
    ['group-theory-1', 'topological-algebra'],
    ['general-topology', 'topological-algebra'],
    ['linear-algebra-1', 'real-analysis'],
    ['general-topology', 'real-analysis'],
    ['metric-spaces', 'real-analysis'],
    ['real-analysis', 'complex-analysis'],
    ['linear-algebra-2', 'functional-analysis'],
    ['real-analysis', 'functional-analysis'],

    ['real-analysis', 'measure-theory'],
    ['linear-algebra-1', 'measure-theory'],
    ['measure-theory', 'probability'],

    ['measure-theory', 'dynamics'],

    ['general-topology', 'convex-geometry'],

    ['measure-theory', 'fourier-odes'],

    ['elementary-nt', 'analytic-nt'],

    ['field-galois', 'algebraic-nt'],

    ['elementary-nt', 'algebraic-nt'],

    ['finite-math', 'computability'],
    ['functions-relations', 'computability'],

  // ── Graph index ─────────────────────────────────────────────────

  const courseMap = {};
  courses.forEach(c => { courseMap[c.id] = c; });

  const prereqsOf = {};
  courses.forEach(c => { prereqsOf[c.id] = []; });
  edges.forEach(([from, to]) => { prereqsOf[to].push(from); });

  const dependentsOf = {};
  courses.forEach(c => { dependentsOf[c.id] = []; });
  edges.forEach(([from, to]) => { dependentsOf[from].push(to); });

  function getAncestors(id) {
    const result = new Set();
    const stack = [id];
    while (stack.length) {
      const cur = stack.pop();
      prereqsOf[cur].forEach(p => {
        if (!result.has(p)) { result.add(p); stack.push(p); }
      });
    }
    return result;
  }

  function getDescendants(id) {
    const result = new Set();
    const stack = [id];
    while (stack.length) {
      const cur = stack.pop();
      dependentsOf[cur].forEach(d => {
        if (!result.has(d)) { result.add(d); stack.push(d); }
      });
    }
    return result;
  }

  // ── Auto-layout: width-constrained Sugiyama ─────────────────────

  // Topological sort
  const topoOrder = (function() {
    const deg = {};
    courses.forEach(c => { deg[c.id] = 0; });
    edges.forEach(([, to]) => { deg[to]++; });
    const q = courses.filter(c => deg[c.id] === 0).map(c => c.id);
    const order = [];
    let head = 0;
    while (head < q.length) {
      const cur = q[head++];
      order.push(cur);
      dependentsOf[cur].forEach(d => { if (--deg[d] === 0) q.push(d); });
    }
    return order;
  })();

  // Step 1: Layer assignment via longest path from sources
  const layer = {};
  topoOrder.forEach(id => {
    const preds = prereqsOf[id];
    layer[id] = preds.length === 0 ? 0 : Math.max(...preds.map(p => layer[p])) + 1;
  });

  // Step 2: Enforce width constraint by promoting overflow nodes
  for (let iter = 0; iter < 300; iter++) {
    const buckets = {};
    courses.forEach(c => {
      const l = layer[c.id];
      if (!buckets[l]) buckets[l] = [];
      buckets[l].push(c.id);
    });

    const lvls = Object.keys(buckets).map(Number).sort((a, b) => a - b);
    const overflow = lvls.find(l => buckets[l].length > MAX_PER_ROW);
    if (overflow === undefined) break;

    // Pick the node with most slack (room to push down without cascade),
    // breaking ties by fewest descendants (least cascade impact)
    const candidates = buckets[overflow].map(id => {
      const deps = dependentsOf[id];
      const slack = deps.length > 0
        ? Math.min(...deps.map(d => layer[d])) - layer[id] - 1
        : 999;
      return { id, slack, desc: getDescendants(id).size };
    });
    candidates.sort((a, b) => (b.slack - a.slack) || (a.desc - b.desc));

    layer[candidates[0].id]++;

    // Cascade: ensure all descendants still satisfy layer[child] > layer[parent]
    topoOrder.forEach(id => {
      const preds = prereqsOf[id];
      if (preds.length > 0) {
        const minReq = Math.max(...preds.map(p => layer[p])) + 1;
        if (layer[id] < minReq) layer[id] = minReq;
      }
    });
  }

  // Step 3: Barycenter crossing minimization
  const rowNodes = {};
  courses.forEach(c => {
    const l = layer[c.id];
    if (!rowNodes[l]) rowNodes[l] = [];
    rowNodes[l].push(c.id);
  });
  const sortedLevels = Object.keys(rowNodes).map(Number).sort((a, b) => a - b);

  // Initialize column indices
  const colIdx = {};
  sortedLevels.forEach(l => { rowNodes[l].forEach((id, i) => { colIdx[id] = i; }); });

  for (let iter = 0; iter < 30; iter++) {
    // Down sweep: order each row by average position of predecessors
    for (let li = 1; li < sortedLevels.length; li++) {
      const l = sortedLevels[li];
      rowNodes[l].forEach(id => {
        const nbrs = prereqsOf[id].filter(p => layer[p] < l);
        if (nbrs.length > 0) colIdx[id] = nbrs.reduce((s, p) => s + colIdx[p], 0) / nbrs.length;
      });
      rowNodes[l].sort((a, b) => colIdx[a] - colIdx[b]);
      rowNodes[l].forEach((id, i) => { colIdx[id] = i; });
    }
    // Up sweep: order each row by average position of dependents
    for (let li = sortedLevels.length - 2; li >= 0; li--) {
      const l = sortedLevels[li];
      rowNodes[l].forEach(id => {
        const nbrs = dependentsOf[id].filter(d => layer[d] > l);
        if (nbrs.length > 0) colIdx[id] = nbrs.reduce((s, d) => s + colIdx[d], 0) / nbrs.length;
      });
      rowNodes[l].sort((a, b) => colIdx[a] - colIdx[b]);
      rowNodes[l].forEach((id, i) => { colIdx[id] = i; });
    }
  }

  // Step 4: Final positions — center narrow rows within the widest row
  const maxRowLen = Math.max(...sortedLevels.map(l => rowNodes[l].length));
  const positions = {};
  sortedLevels.forEach((l, ri) => {
    const len = rowNodes[l].length;
    const offset = (maxRowLen - len) / 2;
    rowNodes[l].forEach((id, ci) => { positions[id] = [ci + offset, ri]; });
  });

  // ── Pixel coordinates ───────────────────────────────────────────

  const COL_STEP = NODE_W + H_GAP;
  const ROW_STEP = NODE_H + V_GAP;

  function nodeX(c) { return PAD_X + c * COL_STEP; }
  function nodeY(r) { return PAD_Y + r * ROW_STEP; }
  function nodeCX(c) { return nodeX(c) + NODE_W / 2; }

  const graphW = PAD_X * 2 + (maxRowLen - 1) * COL_STEP + NODE_W;
  const graphH = PAD_Y * 2 + (sortedLevels.length - 1) * ROW_STEP + NODE_H;

  // ── SVG rendering ───────────────────────────────────────────────

  const svg = document.getElementById('graph');
  const tooltip = document.getElementById('tooltip');

  svg.setAttribute('viewBox', `0 0 ${graphW} ${graphH}`);
  svg.setAttribute('width', graphW);
  svg.setAttribute('height', graphH);

  const NS = 'http://www.w3.org/2000/svg';
  function svgEl(tag, attrs) {
    const el = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    return el;
  }

  // Arrow marker
  const defs = svgEl('defs');
  const marker = svgEl('marker', {
    id: 'arrowhead', markerWidth: '5', markerHeight: '4',
    refX: '5', refY: '2', orient: 'auto',
  });
  marker.appendChild(svgEl('polygon', { points: '0 0, 5 2, 0 4', class: 'arrowhead' }));
  defs.appendChild(marker);
  svg.appendChild(defs);

  const edgeGroup = svgEl('g', { class: 'edges' });
  svg.appendChild(edgeGroup);
  const nodeGroup = svgEl('g', { class: 'nodes' });
  svg.appendChild(nodeGroup);

  // Draw edges
  const edgeElements = {};
  edges.forEach(([from, to]) => {
    const [fc, fr] = positions[from];
    const [tc, tr] = positions[to];

    const x1 = nodeCX(fc);
    const y1 = nodeY(fr) + NODE_H;
    const x2 = nodeCX(tc);
    const y2 = nodeY(tr);

    const edgeG = svgEl('g', { class: 'edge', 'data-from': from, 'data-to': to });
    edgeG.appendChild(svgEl('line', {
      x1, y1, x2, y2,
      'marker-end': 'url(#arrowhead)',
    }));
    edgeGroup.appendChild(edgeG);
    edgeElements[`${from}|${to}`] = edgeG;
  });

  // Draw nodes
  const nodeElements = {};
  courses.forEach(c => {
    const [col, row] = positions[c.id];
    const x = nodeX(col);
    const y = nodeY(row);
    const colors = SECTION_COLORS[c.section];
    const status = c.url ? 'live' : 'coming-soon';

    const group = svgEl('g', {
      class: `node ${status}`,
      'data-id': c.id,
      transform: `translate(${x}, ${y})`,
    });

    group.appendChild(svgEl('rect', {
      width: NODE_W, height: NODE_H,
      fill: colors.fill, stroke: colors.stroke,
    }));

    const text = svgEl('text', { x: NODE_W / 2, y: NODE_H / 2 });
    text.textContent = c.name;
    group.appendChild(text);

    group.addEventListener('mouseenter', (e) => onNodeEnter(c, e));
    group.addEventListener('mouseleave', () => onNodeLeave());
    group.addEventListener('click', () => onNodeClick(c));

    nodeGroup.appendChild(group);
    nodeElements[c.id] = group;
  });

  // ── Interaction ─────────────────────────────────────────────────

  function onNodeEnter(course, event) {
    const ancestors = getAncestors(course.id);
    const descendants = getDescendants(course.id);
    const related = new Set([course.id, ...ancestors, ...descendants]);

    courses.forEach(c => {
      const el = nodeElements[c.id];
      if (related.has(c.id)) { el.classList.add('highlighted'); el.classList.remove('faded'); }
      else { el.classList.add('faded'); el.classList.remove('highlighted'); }
    });

    edges.forEach(([from, to]) => {
      const el = edgeElements[`${from}|${to}`];
      if (related.has(from) && related.has(to)) { el.classList.add('highlighted'); el.classList.remove('faded'); }
      else { el.classList.add('faded'); el.classList.remove('highlighted'); }
    });

    const prereqNames = prereqsOf[course.id].map(p => courseMap[p].name);
    tooltip.querySelector('.tt-name').textContent = course.fullName;
    tooltip.querySelector('.tt-section').textContent = SECTION_LABELS[course.section];

    const ttStatus = tooltip.querySelector('.tt-status');
    if (course.url) {
      ttStatus.textContent = 'Available — click to play';
      ttStatus.className = 'tt-status live';
    } else {
      ttStatus.textContent = 'Coming Soon';
      ttStatus.className = 'tt-status coming-soon';
    }

    const ttPrereqs = tooltip.querySelector('.tt-prereqs');
    ttPrereqs.textContent = prereqNames.length > 0
      ? 'Prereqs: ' + prereqNames.join(', ')
      : 'No prerequisites';

    tooltip.style.display = 'block';
    positionTooltip(event);
  }

  function positionTooltip(event) {
    const x = event.clientX + 12;
    const y = event.clientY + 12;
    const ttRect = tooltip.getBoundingClientRect();
    tooltip.style.left = Math.min(x, window.innerWidth - ttRect.width - 8) + 'px';
    tooltip.style.top = Math.min(y, window.innerHeight - ttRect.height - 8) + 'px';
  }

  document.addEventListener('mousemove', (e) => {
    if (tooltip.style.display === 'block') positionTooltip(e);
  });

  function onNodeLeave() {
    courses.forEach(c => { nodeElements[c.id].classList.remove('highlighted', 'faded'); });
    edges.forEach(([from, to]) => { edgeElements[`${from}|${to}`].classList.remove('highlighted', 'faded'); });
    tooltip.style.display = 'none';
  }

  function onNodeClick(course) {
    if (!course.url) return;
    window.open(course.url, '_blank');
  }

})();
</script>

</body>
</html>
